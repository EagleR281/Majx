<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe — License Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #010008;
    --bg:   #040012;
    --card: #080020;
    --e1:   #0d0030;
    --e2:   #160048;
    --e3:   #1e005e;
    --p0:   #4c1d95;
    --p1:   #6d28d9;
    --p2:   #8b5cf6;
    --p3:   #a78bfa;
    --p4:   #c4b5fd;
    --ok:   #10b981;
    --ok2:  #34d399;
    --warn: #f59e0b;
    --err:  #f43f5e;
    --a1:   #06b6d4;
    --t0:   #f0ecff;
    --t1:   #c4b5fd;
    --t2:   #8b6fd4;
    --t3:   #4e3880;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--void);
    color: var(--t0);
    font-family: 'Tajawal', sans-serif;
    overflow: hidden;
  }

  /* ── Canvas Background ── */
  #aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Grid overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(107,70,193,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(107,70,193,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
    pointer-events: none;
  }

  /* ── Pages ── */
  .page {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .5s ease, transform .5s ease;
  }
  .page.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(24px);
  }

  /* ══ LOGIN PAGE ══ */
  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
    justify-content: center;
  }
  .logo-bar {
    width: 3px;
    height: 22px;
    background: var(--p2);
    border-radius: 2px;
  }
  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--t0);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--t3);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .login-card {
    background: rgba(8, 0, 32, 0.85);
    border: 1px solid rgba(107,70,193,.35);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--p1), var(--p2), transparent);
  }

  .login-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--t0);
    margin-bottom: 6px;
    text-align: center;
  }
  .login-desc {
    font-size: 13px;
    color: var(--t2);
    text-align: center;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .field-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--t3);
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: block;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .code-input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(13,0,48,.8);
    border: 1px solid rgba(107,70,193,.3);
    border-radius: 10px;
    color: var(--p3);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    text-align: left;
    direction: ltr;
  }
  .code-input::placeholder { color: var(--t3); letter-spacing: 2px; }
  .code-input:focus {
    border-color: var(--p2);
    box-shadow: 0 0 0 3px rgba(109,40,217,.2);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--p1), var(--p2));
    border: 1px solid var(--p1);
    border-radius: 10px;
    color: #fff;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,.08));
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(109,40,217,.4);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: .6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
    transition: color .2s;
  }
  .msg.err  { color: var(--err); }
  .msg.ok   { color: var(--ok2); }
  .msg.info { color: var(--a1); }

  /* loading dots */
  .dots::after {
    content: '';
    animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  /* ══ DASHBOARD PAGE ══ */
  #dashboard {
    padding: 20px;
    flex-direction: column;
    align-items: center;
    gap: 0;
    overflow-y: auto;
    overflow-x: hidden;
  }
  #dashboard:not(.hidden) {
    display: flex;
  }

  .dash-inner {
    width: 100%;
    max-width: 560px;
  }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .dash-logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logout-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--t3);
    border-radius: 8px;
    color: var(--t2);
    font-family: 'Tajawal', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .logout-btn:hover {
    border-color: var(--err);
    color: var(--err);
  }

  /* Key card */
  .key-card {
    background: rgba(8,0,32,.9);
    border: 1px solid rgba(107,70,193,.4);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }
  .key-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--p1), var(--p2), transparent);
  }

  .key-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--t3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .key-code {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--p3);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .copy-btn {
    padding: 4px 12px;
    background: rgba(109,40,217,.2);
    border: 1px solid rgba(109,40,217,.4);
    border-radius: 6px;
    color: var(--p3);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    font-family: 'Tajawal', sans-serif;
  }
  .copy-btn:hover { background: rgba(109,40,217,.4); }
  .copy-btn.copied { color: var(--ok2); border-color: var(--ok); }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: rgba(13,0,48,.8);
    border: 1px solid rgba(107,70,193,.25);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: rgba(107,70,193,.5); }
  .stat-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--t3);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--t0);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-value.green { color: var(--ok2); }
  .stat-value.yellow { color: var(--warn); }
  .stat-value.purple { color: var(--p3); }
  .stat-value.cyan { color: var(--a1); }
  .stat-sub {
    font-size: 11px;
    color: var(--t2);
  }

  /* Status chip */
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px 4px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 8px;
  }
  .chip-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .chip-active  { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.4); color: var(--ok2); }
  .chip-active  .chip-dot { background: var(--ok2); box-shadow: 0 0 6px var(--ok); animation: pulse-dot 2s infinite; }
  .chip-paused  { background: rgba(6,182,212,.12);  border: 1px solid rgba(6,182,212,.4);  color: var(--a1); }
  .chip-paused  .chip-dot { background: var(--a1); }
  .chip-pending { background: rgba(139,111,212,.12); border: 1px solid rgba(139,111,212,.3); color: var(--t2); }
  .chip-pending .chip-dot { background: var(--t2); }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 4px var(--ok); }
    50%       { box-shadow: 0 0 10px var(--ok), 0 0 20px rgba(16,185,129,.3); }
  }

  /* Timer bar */
  .timer-card {
    background: rgba(13,0,48,.8);
    border: 1px solid rgba(107,70,193,.25);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .timer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .timer-big {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--ok2);
    letter-spacing: 2px;
  }
  .timer-big.warn { color: var(--warn); }
  .progress-track {
    height: 6px;
    background: rgba(107,70,193,.15);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--p1), var(--p2), var(--ok));
    transition: width 1s ease;
  }
  .progress-fill.warn {
    background: linear-gradient(90deg, var(--warn), #f97316);
  }

  /* Device card */
  .device-card {
    background: rgba(13,0,48,.8);
    border: 1px solid rgba(107,70,193,.25);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .device-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .device-icon {
    width: 38px; height: 38px;
    background: rgba(109,40,217,.2);
    border: 1px solid rgba(109,40,217,.4);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .device-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--t0);
  }
  .device-hwid {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--t3);
    margin-top: 3px;
    word-break: break-all;
  }

  /* Footer */
  .dash-footer {
    text-align: center;
    font-size: 10px;
    color: var(--t3);
    letter-spacing: 2px;
    padding-top: 8px;
    padding-bottom: 20px;
  }

  /* Refresh indicator */
  .refresh-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 10px;
    color: var(--t3);
    margin-bottom: 16px;
  }
  .refresh-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--p2);
    animation: pulse-dot 2s infinite;
  }

  /* Skeleton loader */
  .skeleton {
    background: linear-gradient(90deg, var(--e1) 25%, var(--e2) 50%, var(--e1) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Page-in animation */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fade-up .4s ease forwards; }
  .delay-1 { animation-delay: .08s; opacity: 0; }
  .delay-2 { animation-delay: .16s; opacity: 0; }
  .delay-3 { animation-delay: .24s; opacity: 0; }
  .delay-4 { animation-delay: .32s; opacity: 0; }
</style>
</head>
<body>

<canvas id="aurora"></canvas>

<!-- ═══ LOGIN PAGE ═══ -->
<div class="page" id="login">
  <div class="login-wrap">
    <div class="logo-row animate-in">
      <div class="logo-bar"></div>
      <div>
        <div class="logo-text">VIBE</div>
        <div class="logo-sub">License Portal</div>
      </div>
    </div>

    <div class="login-card animate-in delay-1">
      <div class="login-title">أدخل كود التفعيل</div>
      <div class="login-desc">تحقق من صلاحية ترخيصك وتفاصيله</div>

      <label class="field-label">LICENSE KEY</label>
      <div class="input-wrap">
        <input
          class="code-input"
          id="codeInput"
          type="text"
          placeholder="Vibe-1D-XXXXX"
          autocomplete="off"
          spellcheck="false"
          maxlength="40"
        />
      </div>

      <button class="btn-primary" id="loginBtn" onclick="doLogin()">
        تحقق من الترخيص
      </button>
      <div class="msg" id="loginMsg"></div>
    </div>
  </div>
</div>

<!-- ═══ DASHBOARD PAGE ═══ -->
<div class="page hidden" id="dashboard">
  <div class="dash-inner">

    <div class="dash-header animate-in">
      <div class="dash-logo">
        <div class="logo-bar"></div>
        <div>
          <div class="logo-text" style="font-size:16px">VIBE</div>
          <div class="logo-sub">License Portal</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">تسجيل الخروج</button>
    </div>

    <!-- Key display -->
    <div class="key-card animate-in delay-1">
      <div class="key-label">LICENSE KEY</div>
      <div class="key-code">
        <span id="d-code">—</span>
        <button class="copy-btn" id="copyBtn" onclick="copyCode()">نسخ</button>
      </div>
      <div id="d-chip" class="status-chip chip-pending" style="margin-top:10px">
        <div class="chip-dot"></div>
        <span>Inactive</span>
      </div>
    </div>

    <!-- Timer -->
    <div class="timer-card animate-in delay-2">
      <div class="timer-header">
        <div>
          <div class="key-label">الوقت المتبقي</div>
          <div class="timer-big" id="d-timer">—</div>
        </div>
        <div style="text-align:left">
          <div class="key-label">انتهاء الترخيص</div>
          <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--t2);margin-top:4px" id="d-expires">—</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="d-progress" style="width:0%"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid animate-in delay-3">
      <div class="stat-card">
        <div class="stat-label">الحالة</div>
        <div class="stat-value purple" id="d-status">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">مدة الترخيص</div>
        <div class="stat-value cyan" id="d-duration">—</div>
      </div>
    </div>

    <!-- Device -->
    <div class="device-card animate-in delay-4">
      <div class="key-label">الجهاز المسجّل</div>
      <div class="device-row" style="margin-top:10px">
        <div class="device-icon">💻</div>
        <div>
          <div class="device-name" id="d-device">—</div>
          <div class="device-hwid" id="d-hwid">—</div>
        </div>
      </div>
    </div>

    <div class="refresh-row">
      <div class="refresh-dot"></div>
      <span>يتحدث تلقائياً كل 30 ثانية</span>
    </div>

    <div class="dash-footer">VIBE LICENSE PORTAL · 2025</div>
  </div>
</div>

<script>
const API = 'https://Majx.pythonanywhere.com';
let _code = '';
let _refreshTimer = null;
let _countdownTimer = null;
let _expireTs = null;
let _durationHours = 1;

// ── Aurora background ──
(function() {
  const canvas = document.getElementById('aurora');
  const ctx = canvas.getContext('2d');
  let t = 0;
  let W, H;
  const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
  resize(); window.addEventListener('resize', resize);

  function lerp(a,b,n){ return a+(b-a)*n; }
  function ease(t){ return t<.5?2*t*t:(4-2*t)*t-1; }

  const orbs = [
    { x:.3, y:.3, r:.5, speed:.7,  phase:0,    cr:[80,10,200] },
    { x:.7, y:.6, r:.4, speed:.45, phase:2.094, cr:[30,5,180]  },
    { x:.5, y:.8, r:.6, speed:.55, phase:4.189, cr:[60,3,220]  },
  ];

  function draw() {
    t += .008;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#010008';
    ctx.fillRect(0,0,W,H);

    orbs.forEach(o => {
      const ox = (o.x + Math.cos(t*o.speed+o.phase)*.28)*W;
      const oy = (o.y + Math.sin(t*o.speed*1.3+o.phase)*.22)*H;
      const grad = ctx.createRadialGradient(ox,oy,0,ox,oy,o.r*Math.min(W,H)*.65);
      grad.addColorStop(0, `rgba(${o.cr[0]},${o.cr[1]},${o.cr[2]},.28)`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Helpers ──
function parseSecs(expires) {
  if (!expires || ['Not Started','None','null','Expired','PAUSED'].includes(String(expires).trim())) return null;
  const s = String(expires).trim();
  if (/^\d+$/.test(s)) {
    const ts = parseInt(s);
    return ts - Math.floor(Date.now()/1000);
  }
  try {
    const d = new Date(s.replace(' ','T')+'Z');
    return Math.floor((d - Date.now()) / 1000);
  } catch(e) { return null; }
}

function fmtSecs(s) {
  if (s === null) return '—';
  if (s <= 0) return 'Expired';
  if (s > 3_153_600_000) return '∞ Lifetime';
  const d = Math.floor(s/86400);
  const h = Math.floor((s%86400)/3600);
  const m = Math.floor((s%3600)/60);
  const sc = s%60;
  if (d > 0) return `${d}D ${String(h).padStart(2,'0')}H ${String(m).padStart(2,'0')}M`;
  if (h > 0) return `${h}H ${String(m).padStart(2,'0')}M ${String(sc).padStart(2,'0')}S`;
  if (m > 0) return `${m}M ${String(sc).padStart(2,'0')}S`;
  return `${sc}S`;
}

function fmtExpires(exp) {
  if (!exp || exp === 'PAUSED') return exp || '—';
  const s = String(exp).trim();
  if (s === 'Not Started') return 'لم يبدأ بعد';
  try {
    const d = new Date(s.replace(' ','T')+'Z');
    return d.toLocaleDateString('ar-SA', {year:'numeric',month:'short',day:'numeric'})
         + '  '
         + d.toLocaleTimeString('ar-SA', {hour:'2-digit',minute:'2-digit'});
  } catch(e) { return s; }
}

function fmtDuration(hours) {
  if (!hours) return '—';
  if (hours >= 876000) return 'Lifetime ∞';
  if (hours >= 720) return `${Math.round(hours/720)} شهر`;
  if (hours >= 24)  return `${Math.round(hours/24)} يوم`;
  return `${hours} ساعة`;
}

function getState(data) {
  const exp = data.expires || '';
  const pu = exp.trim().toUpperCase().replace(/ /g,'_');
  if (data.timer_paused || pu === 'PAUSED') return 'paused';
  if (!exp || exp === 'Not Started') return 'pending';
  const secs = parseSecs(exp);
  if (secs === null) return 'pending';
  if (secs <= 0) return 'expired';
  return 'active';
}

// ── Login ──
async function doLogin() {
  const code = document.getElementById('codeInput').value.trim();
  const msg  = document.getElementById('loginMsg');
  const btn  = document.getElementById('loginBtn');

  if (!code) { setMsg(msg,'يرجى إدخال الكود','err'); return; }

  btn.disabled = true;
  setMsg(msg,'جاري التحقق','info','dots');

  try {
    const res = await fetch(`${API}/client/verify_web`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({code})
    });
    const data = await res.json();

    if (data.success) {
      setMsg(msg,'تم التحقق — جاري الدخول','ok');
      _code = code;
      localStorage.setItem('vibe_code', code);
      setTimeout(() => showDash(data), 700);
    } else {
      const errMap = {
        'Invalid Code':    'الكود غير صحيح',
        'HWID_MISMATCH':   'الكود مرتبط بجهاز آخر',
        'Key Expired':     'انتهت صلاحية الكود',
      };
      setMsg(msg, errMap[data.error] || data.error || 'فشل التحقق', 'err');
      btn.disabled = false;
    }
  } catch(e) {
    setMsg(msg,'تعذّر الاتصال بالخادم','err');
    btn.disabled = false;
  }
}

function setMsg(el, text, cls, extra='') {
  el.textContent = text;
  el.className = `msg ${cls} ${extra}`;
}

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Dashboard ──
function showDash(data) {
  document.getElementById('login').classList.add('hidden');
  const dash = document.getElementById('dashboard');
  dash.classList.remove('hidden');
  fillDash(data);
  startRefresh();
  startCountdown(data.expires, data.duration);
}

function fillDash(data) {
  const state = getState(data);
  const secs  = parseSecs(data.expires);

  // Code
  document.getElementById('d-code').textContent = data.code || _code;

  // Status chip
  const chip = document.getElementById('d-chip');
  const chipMap = {
    active:  ['chip-active',  '● نشط'],
    paused:  ['chip-paused',  '⏸ متوقف مؤقتاً'],
    pending: ['chip-pending', '○ غير مفعّل'],
    expired: ['chip-pending', '✕ منتهي'],
  };
  const [chipCls, chipTxt] = chipMap[state] || chipMap.pending;
  chip.className = `status-chip ${chipCls}`;
  chip.innerHTML = `<div class="chip-dot"></div><span>${chipTxt}</span>`;

  // Timer
  const timerEl = document.getElementById('d-timer');
  if (state === 'paused') {
    const pr = data.paused_remaining_seconds;
    timerEl.textContent = pr > 0 ? fmtSecs(pr) : 'Paused';
    timerEl.className = 'timer-big';
    _expireTs = null;
  } else if (state === 'pending') {
    timerEl.textContent = 'Inactive';
    timerEl.className = 'timer-big';
    _expireTs = null;
  } else if (secs !== null) {
    timerEl.textContent = fmtSecs(secs);
    timerEl.className = 'timer-big' + (secs < 3600 ? ' warn' : '');
    _expireTs = Math.floor(Date.now()/1000) + secs;
  }

  // Expires
  document.getElementById('d-expires').textContent = fmtExpires(data.expires);

  // Progress bar
  const prog = document.getElementById('d-progress');
  if (secs !== null && secs > 0 && data.duration) {
    const total = data.duration * 3600;
    const pct = Math.min(100, Math.max(0, (secs/total)*100));
    prog.style.width = pct + '%';
    prog.className = 'progress-fill' + (secs < 3600 ? ' warn' : '');
  } else {
    prog.style.width = '0%';
  }

  // Status label
  const statusLbl = {active:'Active',paused:'Paused',pending:'Inactive',expired:'Expired'};
  const statusEl = document.getElementById('d-status');
  statusEl.textContent = statusLbl[state] || '—';
  statusEl.className = 'stat-value ' + {active:'green',paused:'cyan',pending:'purple',expired:'yellow'}[state];

  // Duration
  document.getElementById('d-duration').textContent = fmtDuration(data.duration);
  _durationHours = data.duration || 1;

  // Device
  document.getElementById('d-device').textContent = data.client_name || 'لم يُسجَّل جهاز';
  const hwid = data.hwid || '—';
  document.getElementById('d-hwid').textContent = hwid !== '—' ? hwid.slice(0,32)+'…' : 'غير مرتبط';
}

// countdown every second
function startCountdown(expires, duration) {
  clearInterval(_countdownTimer);
  if (!expires || expires === 'PAUSED' || expires === 'Not Started') return;
  _countdownTimer = setInterval(() => {
    if (_expireTs === null) return;
    const secs = _expireTs - Math.floor(Date.now()/1000);
    const timerEl = document.getElementById('d-timer');
    if (secs <= 0) {
      timerEl.textContent = 'Expired';
      clearInterval(_countdownTimer);
      return;
    }
    timerEl.textContent = fmtSecs(secs);
    timerEl.className = 'timer-big' + (secs < 3600 ? ' warn' : '');
    if (duration) {
      const total = duration * 3600;
      const pct = Math.min(100, (secs/total)*100);
      const prog = document.getElementById('d-progress');
      prog.style.width = pct + '%';
      prog.className = 'progress-fill' + (secs < 3600 ? ' warn' : '');
    }
  }, 1000);
}

// auto-refresh from server every 30s
function startRefresh() {
  clearInterval(_refreshTimer);
  _refreshTimer = setInterval(async () => {
    if (!_code) return;
    try {
      const res = await fetch(`${API}/client/verify_web`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({code: _code})
      });
      const data = await res.json();
      if (data.success) {
        fillDash(data);
        startCountdown(data.expires, data.duration);
      }
    } catch(e) {}
  }, 30000);
}

function copyCode() {
  const code = document.getElementById('d-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'تم ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'نسخ'; btn.classList.remove('copied'); }, 1800);
  });
}

function doLogout() {
  clearInterval(_refreshTimer);
  clearInterval(_countdownTimer);
  _code = '';
  _expireTs = null;
  localStorage.removeItem('vibe_code');
  document.getElementById('dashboard').classList.add('hidden');
  const login = document.getElementById('login');
  login.classList.remove('hidden');
  document.getElementById('codeInput').value = '';
  document.getElementById('loginMsg').className = 'msg';
  document.getElementById('loginMsg').textContent = '';
  document.getElementById('loginBtn').disabled = false;
}

// Auto-login from localStorage
(async function() {
  const saved = localStorage.getItem('vibe_code');
  if (!saved) return;
  try {
    const res = await fetch(`${API}/client/verify_web`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code: saved})
    });
    const data = await res.json();
    if (data.success) {
      _code = saved;
      showDash(data);
    } else {
      localStorage.removeItem('vibe_code');
    }
  } catch(e) {}
})();
</script>
